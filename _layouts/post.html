---
layout: default
---

<article class="post-layout">
  <header class="post-header">
    <a class="back-link" href="{{ '/blog/' | relative_url }}">Blog</a>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%d %B %Y" }}
      <span>{{ page.category }}</span>
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
